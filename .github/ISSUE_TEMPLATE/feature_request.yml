name: 機能要望
description: _template への新機能・改善提案を起票します
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能要望ありがとうございます。背景・目的を明確に記述していただくと、設計・優先度判断がしやすくなります。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: どのような課題・不便を解決したいかを記述してください。
      placeholder: 例）テンプレート生成時に毎回同じ設定を手動で入力する必要があり、ミスが発生しやすい。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: どのような機能・変更を提案するかを記述してください。
      placeholder: 例）`just new-part` に設定ファイルを渡すオプションを追加し、繰り返し設定を省略できるようにする。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に考えた解決策があれば記述してください。なければ「なし」と記入してください。
      placeholder: 例）既存の `just` レシピを拡張する方法も検討したが、引数の複雑さから新規コマンドを優先した。
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: テンプレート利用者への影響
      description: この変更が _template を使うプロジェクト（下流）に与える影響を記述してください。破壊的変更の有無も明示してください。
      placeholder: |
        - 既存の生成済みファイルへの影響: なし
        - 破壊的変更: なし（オプション追加のみ）
        - 利用者が対応すべき作業: なし
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 参考 Issue・PR・設計資料などがあれば記述してください。
    validations:
      required: false
