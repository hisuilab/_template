name: Update Nix flake

on:
  schedule:
    - cron: "0 0 1 * *" # 毎月1日 00:00 UTC / 09:00 JST
  workflow_dispatch:

concurrency:
  group: update-flake
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2
      - name: Update flake.lock
        run: nix flake update
      - name: Create pull request
        run: |
          git add flake.lock
          if git diff --cached --quiet -- flake.lock; then
            echo "flake.lock に変更はありません"
            exit 0
          fi
          BRANCH="chore/nix-flake-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git commit -m "chore: update flake.lock"
          nix develop --command just verify
          nix flake check --print-build-logs
          git push --force-with-lease origin "$BRANCH"
          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh pr create \
              --title "chore: update flake.lock" \
              --body "月次 Nix flake inputs 更新。" \
              --base main \
              --head "$BRANCH"
          else
            echo "PR already exists for $BRANCH — skipping gh pr create"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
