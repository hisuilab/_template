[global]
# MD013: 日本語文書と長いリンクを不自然に折り返さないため、行長を制限しません。
# MD028: GitHub Alertsの引用ブロックを許可します。
disable = ["MD013", "MD028"]

# ドキュメントではないファイルを対象外にします。
# PULL_REQUEST_TEMPLATE.mdはPR本文に挿入される前提でレベル1見出しを持たない慣習のため、MD041対象外にします。
# LICENSEは法的テキストのためMarkdownルールを適用しません。
exclude = [".github/PULL_REQUEST_TEMPLATE.md", "LICENSE"]

# テーブルのスタイルを指定します。
[MD060]
enabled = true
style = "compact"

# <!-- toc --> ... <!-- tocstop --> で囲んだ目次ブロックを見出しと同期させます。
[MD073]
enabled = true
