[part]
id = "lang/python"
layer = "lang"
summary = "Python 言語環境（python3 / uv / ruff / pytest）"
requires = ["base"]
conflicts = ["lang/typescript", "lang/rust", "lang/go"]

[placeholders]
required = ["project_name"]

[variables]
lang_packages = """pkgs.python3
              pkgs.python3Packages.pytest
              pkgs.ruff
              pkgs.uv"""

[[files]]
path = "treefmt.nix"
strategy = "replace"

[[files]]
path = "justfile"
strategy = "replace"

[[files]]
path = ".gitignore"
strategy = "append"
