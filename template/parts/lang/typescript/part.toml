[part]
id = "lang/typescript"
layer = "lang"
summary = "TypeScript 言語環境（nodejs / biome）"
requires = ["base"]
conflicts = ["lang/python", "lang/rust", "lang/go"]

[placeholders]
required = ["project_name"]

[variables]
lang_packages = """pkgs.biome
              pkgs.nodejs"""

[[files]]
path = "treefmt.nix"
strategy = "replace"

[[files]]
path = "justfile"
strategy = "replace"

[[files]]
path = "biome.json"
strategy = "replace"

[[files]]
path = "package.json"
strategy = "replace"

[[files]]
path = ".gitignore"
strategy = "append"
