[part]
id = "lang/rust"
layer = "lang"
summary = "Rust言語環境（rustc / cargo / clippy / rustfmt）"
requires = ["base"]
conflicts = ["lang/python", "lang/typescript", "lang/go"]

[placeholders]
required = ["project_name"]

[variables]
lang_packages = """pkgs.cargo
              pkgs.clippy
              pkgs.rustc
              pkgs.rustfmt"""

[[files]]
path = "treefmt.nix"
strategy = "replace"

[[files]]
path = "justfile"
strategy = "replace"

[[files]]
path = "Cargo.toml"
strategy = "replace"

[[files]]
path = "src/main.rs"
strategy = "replace"

[[files]]
path = ".gitignore"
strategy = "append"
