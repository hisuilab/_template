[part]
id = "lang/rust"
layer = "lang"
summary = "Rust言語環境（rustc / cargo / clippy / rustfmt）"
requires = ["base"]
conflicts = ["lang/python", "lang/typescript"]

[placeholders]
required = ["project_name"]

[[files]]
path = "flake.nix"
strategy = "replace"

[[files]]
path = "treefmt.nix"
strategy = "replace"

[[files]]
path = "justfile"
strategy = "replace"

[[files]]
path = "Cargo.toml"
strategy = "replace"

[[files]]
path = "src/main.rs"
strategy = "replace"

[[files]]
path = ".gitignore"
strategy = "replace"
