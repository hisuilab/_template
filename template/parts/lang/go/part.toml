[part]
id = "lang/go"
layer = "lang"
summary = "Go言語環境（go / gofmt / golangci-lint）"
requires = ["base"]
conflicts = ["lang/python", "lang/typescript", "lang/rust"]

[placeholders]
required = ["project_name"]

[[files]]
path = "flake.nix"
strategy = "replace"

[[files]]
path = "treefmt.nix"
strategy = "replace"

[[files]]
path = "justfile"
strategy = "replace"

[[files]]
path = "go.mod"
strategy = "replace"

[[files]]
path = "main.go"
strategy = "replace"

[[files]]
path = "main_test.go"
strategy = "replace"

[[files]]
path = ".gitignore"
strategy = "append"
