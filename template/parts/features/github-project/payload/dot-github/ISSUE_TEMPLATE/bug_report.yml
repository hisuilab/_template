name: "バグ報告"
description: "{{project_name}} で見つけたバグを報告する"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。できるだけ詳しく記入してください。
  - type: textarea
    id: description
    attributes:
      label: "バグの内容"
      description: "何が起きているか説明してください"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: "再現手順"
      description: "バグを再現するための手順を記載してください"
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "期待する動作"
      description: "本来どうなるべきかを説明してください"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "環境"
      description: "OS、バージョンなど関連する環境情報を記載してください"
